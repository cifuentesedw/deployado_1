version: 0.2

env:
  variables:
    DATABASE_URL: "sqlite:///:memory:"
    STATIC_TOKEN: "deployado-12042026-token"
    JWT_SECRET_KEY: "jwt-secret-key-blacklist-service-12042026-token"
    FLASK_ENV: "testing"
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"

phases:

  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== FASE INSTALL ==="
      - echo "Python version $(python --version)"
      - echo "Fecha $(date '+%Y-%m-%d %H:%M:%S UTC')"
      - pip install --upgrade pip --quiet
      - pip install -r requirements.txt --quiet
      - pip install pytest pytest-cov --quiet
      - echo "Instalacion completada"

  pre_build:
    commands:
      - echo "=== FASE PRE_BUILD - Pruebas Unitarias ==="
      - echo "Commit $CODEBUILD_RESOLVED_SOURCE_VERSION"
      - echo "Build  $CODEBUILD_BUILD_ID"
      - python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --junit-xml=test-results.xml
      - echo "=== Pruebas unitarias completadas exitosamente ==="

  build:
    commands:
      - echo "=== FASE BUILD - Generando Artefacto ==="
      - export COMMIT_SHORT=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - export BUILD_DATE=$(date '+%Y%m%d-%H%M%S')
      - export ARTIFACT_NAME="blacklist-microservice-${BUILD_DATE}-${COMMIT_SHORT}.zip"
      - echo "Artefacto $ARTIFACT_NAME"
      - zip -r $ARTIFACT_NAME application.py requirements.txt app/ .ebextensions/ -x "app/__pycache__/*" -x "app/*/__pycache__/*" -x "*.pyc" -x ".env"
      - echo "Tamano $(du -sh $ARTIFACT_NAME)"
      - echo $ARTIFACT_NAME > artifact_name.txt
      - echo "=== Artefacto generado exitosamente ==="

  post_build:
    commands:
      - echo "=== FASE POST_BUILD - Resumen ==="
      - export ARTIFACT_NAME=$(cat artifact_name.txt)
      - echo "Estado    EXITOSO"
      - echo "Commit    $CODEBUILD_RESOLVED_SOURCE_VERSION"
      - echo "Artefacto $ARTIFACT_NAME"
      - echo "Hora fin  $(date '+%Y-%m-%d %H:%M:%S UTC')"

artifacts:
  files:
    - "blacklist-microservice-*.zip"
    - test-results.xml
    - coverage.xml
  discard-paths: no

reports:
  pytest-report:
    files:
      - test-results.xml
    file-format: JUNITXML
  coverage-report:
    files:
      - coverage.xml
    file-format: COBERTURAXML

cache:
  paths:
    - "/root/.cache/pip/**/*"
